<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Private Garden of Thoughts</title>
    <!-- Include Supabase for Real-Time Cross-Device Syncing -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-main: #fff5f6;
            --bg-sidebar: #ffe3e8;
            --bg-card: #ffffff; 
            --border: #f7b1bd;
            --text-main: #4a282d;
            --text-muted: #8c6066;
            --accent: #ff8fa3;
            --accent-hover: #ff758f;
            --danger: #e56b6f;
            --hl-pink: #ffccd5;
            --hl-yellow: #fff3b0;
            --hl-green: #c7f9cc;
            --floral-pattern: url('https://www.transparenttextures.com/patterns/floral-paper.png');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-main);
            background-image: var(--floral-pattern);
            color: var(--text-main);
            overflow: hidden;
            position: relative;
            font-family: 'Georgia', serif;
        }

        /* --- Full Screen Overlays --- */
        .fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-main);
            background-image: var(--floral-pattern);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lock-container {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            max-width: 420px;
            width: 92%;
            box-shadow: 0 10px 25px rgba(247, 177, 189, 0.3);
        }

        .lock-container h1 { font-size: 1.6rem; font-style: italic; margin-bottom: 0.5rem; }
        .password-input {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border: 1px solid var(--border);
            border-radius: 20px;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            margin-bottom: 1rem;
        }
        
        .error-message { color: var(--danger); font-size: 0.9rem; margin-bottom: 1rem; font-style: italic; }

        /* --- Sidebar Styling --- */
        .sidebar {
            width: 300px;
            background-color: var(--bg-sidebar);
            border-right: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            height: 100%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .sidebar h2 {
            font-size: 1.3rem;
            margin-bottom: 1.2rem;
            text-align: center;
            font-style: italic;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 0.5rem;
        }

        .search-box {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-main);
            margin-bottom: 1rem;
            outline: none;
        }

        .entry-list { flex: 1; overflow-y: auto; margin-bottom: 1rem; }
        .entry-item {
            padding: 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 15px;
            margin-bottom: 0.75rem;
            cursor: pointer;
        }
        .entry-item.active { border-color: var(--accent-hover); background: #fff9fa; }
        .entry-item .date { font-size: 0.8rem; color: var(--accent-hover); font-weight: bold; }
        .entry-item .preview {
            font-size: 0.9rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; z-index: 5; gap: 0.5rem; }
        .left-toolbar-group { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
        .current-date { font-size: 1.1rem; font-style: italic; }
        .btn-group { display: flex; gap: 0.5rem; }

        button, .toggle-sidebar-btn {
            padding: 0.6rem 1rem;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            white-space: nowrap;
        }

        .btn-primary { background-color: var(--accent); color: white; }
        .btn-secondary { background-color: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); }
        .btn-danger { background-color: transparent; color: var(--danger); }
        .toggle-sidebar-btn { background-color: var(--bg-sidebar); border: 1px solid var(--border); color: var(--text-main); }

        /* --- Text Editor Area --- */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(247, 177, 189, 0.15);
            z-index: 2;
        }

        .editor-tools {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 1rem;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none; 
        }
        .editor-tools::-webkit-scrollbar { display: none; }

        .tool-btn, .tool-select {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.4rem 0.8rem;
            border-radius: 12px;
            font-size: 0.85rem;
            min-height: 35px;
            cursor: pointer;
            outline: none;
        }

        .bullet-tools {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            background: var(--bg-card);
            padding: 0.2rem 0.5rem;
            border-radius: 15px;
            border: 1px solid var(--border);
        }
        .bullet-tools span { font-size: 0.8rem; color: var(--text-muted); font-style: italic; margin-right: 0.2rem; }

        .highlight-palette {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--bg-card);
            padding: 0.2rem 0.5rem;
            border-radius: 15px;
            border: 1px solid var(--border);
            min-height: 35px;
        }
        .highlight-palette span { font-size: 0.8rem; color: var(--text-muted); font-style: italic; margin-right: 0.2rem; }
        .hl-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .workspace-split { display: flex; flex: 1; overflow: hidden; position: relative; }

        .editor-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 1.5rem;
            font-size: 1.1rem;
            line-height: 1.7;
            outline: none;
            overflow-y: auto;
            position: relative; 
            -webkit-overflow-scrolling: touch;
            z-index: 1;
        }

        .editor-input[placeholder]:empty:before {
            content: attr(placeholder);
            color: var(--text-muted);
            font-style: italic;
        }

        .editor-input ul {
            list-style: none;
            padding-left: 1.5rem;
            margin: 0.5rem 0;
        }
        .editor-input ul li {
            position: relative;
            margin-bottom: 0.4rem;
        }
        .editor-input ul li::before {
            content: attr(data-emoji);
            position: absolute;
            left: -1.5rem;
            top: 0;
        }

        /* --- Sticker Side Drawer --- */
        .scrapbook-sidebar {
            width: 150px;
            background: #fffdfd;
            border-left: 1px dashed var(--border);
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 10;
        }

        .scrapbook-sidebar h4 {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
            font-style: italic;
            border-bottom: 1px dotted var(--border);
            padding-bottom: 0.2rem;
        }

        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            justify-items: center;
        }

        .tray-sticker {
            font-size: 2rem;
            cursor: grab;
            user-select: none;
            transition: transform 0.1s ease;
        }
        .tray-sticker:active { transform: scale(1.2); }

        /* --- ADJUSTABLE ASSETS --- */
        .scrapbook-asset {
            position: absolute;
            cursor: move;
            z-index: 50;
            touch-action: none;
            display: inline-block;
            padding: 12px;
            border: 1px solid transparent;
        }

        .scrapbook-asset:hover, .scrapbook-asset:active {
            border: 1px dashed var(--accent);
            border-radius: 6px;
        }

        .asset-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scrapbook-asset.sticker-asset .asset-wrapper { line-height: 1; }
        .scrapbook-asset.photo-asset .asset-wrapper {
            background: white;
            padding: 6px 6px 18px 6px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 10px rgba(247, 177, 189, 0.25);
            border-radius: 4px;
        }

        .scrapbook-asset.photo-asset img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            pointer-events: none;
        }

        /* --- CONTROL HANDLES --- */
        .control-handle {
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 60;
            color: var(--text-main);
            user-select: none;
        }

        .scrapbook-asset:hover .control-handle,
        .scrapbook-asset:active .control-handle {
            display: flex;
        }

        .handle-delete { top: -12px; right: -12px; background: var(--danger); color: white; }
        .handle-resize { bottom: -12px; right: -12px; cursor: se-resize; background: #fff3b0; }
        .handle-rotate { top: -12px; left: -12px; cursor: grab; background: #c7f9cc; }

        #imageInput { display: none; }

        /* --- RESPONSIVE LAYOUTS --- */
        @media (max-width: 850px) {
            body { position: relative; }
            .sidebar { 
                position: absolute; 
                left: 0; 
                top: 0; 
                transform: translateX(-100%); 
                width: 280px;
                box-shadow: 5px 0 15px rgba(0,0,0,0.1);
            }
            .sidebar.open { transform: translateX(0); }
            .workspace-split { flex-direction: column; }
            .scrapbook-sidebar { 
                width: 100%; 
                height: 85px; 
                border-left: none; 
                border-top: 1px dashed var(--border); 
                padding: 0.5rem; 
                flex-direction: row; 
                align-items: center;
                gap: 0.5rem;
            }
            .scrapbook-sidebar h4 { display: none; }
            .sticker-grid { 
                display: flex; 
                flex-direction: row; 
                overflow-x: auto; 
                width: 100%; 
                gap: 1rem; 
                padding: 0 0.5rem;
            }
            .tray-sticker { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <!-- PAGE 1: CLOUD SETUP VIEW (Only shows if keys are missing) -->
    <div id="setupPage" class="fullscreen-overlay" style="display: none;">
        <div class="lock-container">
            <h1>Cloud Link ☁️</h1>
            <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:1.5rem;">Connect your database to sync across iPad, PC, and Phone.</p>
            
            <input type="text" id="dbUrl" class="password-input" placeholder="Supabase URL">
            <input type="password" id="dbAnonKey" class="password-input" placeholder="Supabase Anon Key">
            
            <div id="setupErrMessage" class="error-message"></div>
            <button class="btn-primary" style="width: 100%;" onclick="saveCloudCredentials()">Save & Continue</button>
        </div>
    </div>

    <!-- PAGE 2: DIARY PASSCODE LOCK -->
    <div id="lockScreen" class="fullscreen-overlay" style="display: none;">
        <div class="lock-container">
            <h1>Secret Garden 🔐</h1>
            <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:1.5rem;">Enter your passcode to open your diary</p>

            <input type="password" id="passwordField" class="password-input" placeholder="6-Digit Secret Key" maxlength="6" onkeydown="if(event.key === 'Enter') unlockDiary()">
            
            <div id="errMessage" class="error-message"></div>
            <button class="btn-primary" style="width: 100%;" onclick="unlockDiary()">Unlock Entry</button>
            
            <p style="font-size:0.75rem; color:var(--text-muted); margin-top:1.5rem; cursor:pointer; text-decoration:underline;" onclick="resetCloudSetup()">Update Cloud Keys</p>
        </div>
    </div>

    <!-- Sidebar Component -->
    <div class="sidebar" id="sidebar">
        <h2>My Blooming Thoughts 🌸</h2>
        <button class="btn-primary" style="margin-bottom: 1rem;" onclick="createNewEntry()">+ New Entry</button>
        <input type="text" class="search-box" id="search" placeholder="Search memories..." oninput="renderEntryList()">
        <div class="entry-list" id="entryList"></div>
        <button class="btn-secondary" onclick="exportBackup()">📥 Download Backup</button>
    </div>

    <!-- Main Workspace -->
    <div class="main-content" id="mainWorkspace">
        <div class="toolbar">
            <div class="left-toolbar-group">
                <button class="toggle-sidebar-btn" onclick="toggleSidebar()">📖 Journal</button>
                <div class="current-date" id="displayDate">Select or Create an Entry</div>
            </div>
            <div class="btn-group">
                <button class="btn-danger" id="deleteBtn" onclick="deleteCurrentEntry()" style="display: none;">Delete</button>
                <button class="btn-primary" id="saveBtn" onclick="saveCurrentEntry()" style="display: none;">Save</button>
            </div>
        </div>

        <div class="editor-container" id="editorContainer" style="display: none;">
            <!-- Format Tools Bar -->
            <div class="editor-tools">
                <button class="tool-btn" style="font-weight: bold;" onclick="formatDoc('bold')">B</button>
                <button class="tool-btn" style="font-style: italic;" onclick="formatDoc('italic')">I</button>
                
                <div class="bullet-tools">
                    <span>Lists:</span>
                    <button class="tool-btn" onclick="insertCuteBullet('🌸')">🌸</button>
                    <button class="tool-btn" onclick="insertCuteBullet('🎀')">🎀</button>
                    <button class="tool-btn" onclick="insertCuteBullet('⭐')">⭐</button>
                    <button class="tool-btn" onclick="insertCuteBullet('🧸')">🧸</button>
                </div>

                <select class="tool-select" id="fontSelector" onchange="formatDoc('fontName', this.value)">
                    <option value="Georgia">Georgia</option>
                    <option value="'Courier New', monospace">Courier</option>
                    <option value="'Comic Sans MS', cursive">Comic Sans</option>
                    <option value="sans-serif">Arial</option>
                </select>

                <div class="highlight-palette">
                    <span>Highlight:</span>
                    <div class="hl-dot" style="background: var(--hl-pink);" onmousedown="event.preventDefault(); formatDoc('backColor', '#ffccd5');" ontouchstart="event.preventDefault(); formatDoc('backColor', '#ffccd5');"></div>
                    <div class="hl-dot" style="background: var(--hl-yellow);" onmousedown="event.preventDefault(); formatDoc('backColor', '#fff3b0');" ontouchstart="event.preventDefault(); formatDoc('backColor', '#fff3b0');"></div>
                    <div class="hl-dot" style="background: var(--hl-green);" onmousedown="event.preventDefault(); formatDoc('backColor', '#c7f9cc');" ontouchstart="event.preventDefault(); formatDoc('backColor', '#c7f9cc');"></div>
                    <div class="hl-dot" style="background: #ffffff; position: relative;" onmousedown="event.preventDefault(); formatDoc('backColor', 'transparent');" ontouchstart="event.preventDefault(); formatDoc('backColor', 'transparent');">
                        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); width: 100%; height: 1px; background: red;"></div>
                    </div>
                </div>

                <button class="tool-btn" onclick="document.getElementById('imageInput').click()">🖼️ Add Floating Photo</button>
                <input type="file" id="imageInput" accept="image/*" onchange="handleScrapbookImageUpload(event)">
            </div>
            
            <div class="workspace-split">
                <div class="editor-input" id="diaryText" contenteditable="true" placeholder="Pour your heart out here..."></div>
                
                <div class="scrapbook-sidebar">
                    <h4>Stickers ✨</h4>
                    <div class="sticker-grid">
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '🌸')">🌸</div>
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '💖')">💖</div>
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '🎀')">🎀</div>
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '🧸')">🧸</div>
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '🐱')">🐱</div>
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '🧁')">🧁</div>
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '⭐')">⭐</div>
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '☁️')">☁️</div>
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '🎨')">🎨</div>
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '💘')">💘</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let supabaseClient = null;
        let entries = {};
        let currentEntryId = null;

        // --- PAGE MANAGEMENT NAVIGATION ENGINE ---
        window.addEventListener('DOMContentLoaded', () => {
            const savedUrl = localStorage.getItem('sb_url');
            const savedKey = localStorage.getItem('sb_key');

            if (!savedUrl || !savedKey) {
                document.getElementById('setupPage').style.display = 'flex';
            } else {
                document.getElementById('lockScreen').style.display = 'flex';
                supabaseClient = supabase.createClient(savedUrl, savedKey);
            }
        });

        function saveCloudCredentials() {
            const url = document.getElementById('dbUrl').value.trim();
            const key = document.getElementById('dbAnonKey').value.trim();

            if (!url || !key) {
                document.getElementById('setupErrMessage').innerText = "Please fill in both database fields! 💕";
                return;
            }

            localStorage.setItem('sb_url', url);
            localStorage.setItem('sb_key', key);
            supabaseClient = supabase.createClient(url, key);

            document.getElementById('setupPage').style.display = 'none';
            document.getElementById('lockScreen').style.display = 'flex';
        }

        function resetCloudSetup() {
            localStorage.removeItem('sb_url');
            localStorage.removeItem('sb_key');
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('setupPage').style.display = 'flex';
        }

        async function unlockDiary() {
            const password = document.getElementById('passwordField').value;

            if (password !== "200600") {
                document.getElementById('errMessage').innerText = "Incorrect passcode... 💕";
                return;
            }

            if (supabaseClient) {
                try {
                    await pullDataFromCloud();
                } catch (err) {
                    console.warn("Cloud pull connection issue. Reverting to device storage cache.");
                    loadLocalFallback();
                }
            } else {
                loadLocalFallback();
            }

            const lockScreen = document.getElementById('lockScreen');
            lockScreen.style.opacity = '0';
            setTimeout(() => lockScreen.style.visibility = 'hidden', 500);
            
            renderEntryList();
            
            // Auto-load most recent entry if any exist
            const sortedDates = Object.keys(entries).sort((a, b) => b.localeCompare(a));
            if (sortedDates.length > 0) {
                loadEntry(sortedDates[0]);
            }
        }

        function loadLocalFallback() {
            entries = JSON.parse(localStorage.getItem('private_floral_diary_entries')) || {};
        }

        async function pullDataFromCloud() {
            if (!supabaseClient) return;
            const { data, error } = await supabaseClient.from('diary_entries').select('*');
            if (!error && data) {
                entries = {};
                data.forEach(row => {
                    // row.entry_date acts as a unique ID string now (contains dynamic timestamp strings)
                    entries[row.entry_date] = {
                        text: row.text_content,
                        display_date: row.display_date || row.entry_date.split('_')[0],
                        canvasAssets: typeof row.assets === 'string' ? JSON.parse(row.assets) : row.assets || []
                    };
                });
            }
        }

        async function pushEntryToCloud(idStr) {
            if (!supabaseClient) {
                localStorage.setItem('private_floral_diary_entries', JSON.stringify(entries));
                return;
            }
            const target = entries[idStr];
            await supabaseClient.from('diary_entries').upsert({
                entry_date: idStr,
                text_content: target.text,
                assets: target.canvasAssets,
                display_date: target.display_date
            });
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function formatDoc(cmd, value = null) { document.execCommand(cmd, false, value); document.getElementById('diaryText').focus(); }

        function insertCuteBullet(emoji) {
            document.getElementById('diaryText').focus();
            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            
            const range = selection.getRangeAt(0);
            range.deleteContents();

            const ul = document.createElement('ul');
            const li = document.createElement('li');
            li.setAttribute('data-emoji', emoji);
            li.innerHTML = 'New list item...';
            ul.appendChild(li);

            range.insertNode(ul);
            
            range.selectNodeContents(li);
            selection.removeAllRanges();
            selection.addRange(range);
        }

        // --- SCRAPBOOK INTERACTION ENGINE ---
        function handleScrapbookImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const scrollOffset = document.getElementById('diaryText').scrollTop + 40;
                spawnAsset('photo', e.target.result, 30, scrollOffset, 150, 0);
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        function spawnAsset(type, content, x = 30, y = 30, size = 150, rotation = 0) {
            if (!currentEntryId) return;
            if (type === 'sticker' && size === 150) size = 45;

            const assetId = 'asset_' + Date.now() + Math.random().toString(36).substr(2, 4);
            createFloatingAssetElement(assetId, type, content, x, y, size, rotation);
            
            if (!entries[currentEntryId].canvasAssets) entries[currentEntryId].canvasAssets = [];
            entries[currentEntryId].canvasAssets.push({ id: assetId, type: type, content: content, x: x, y: y, size: size, rotation: rotation });
            pushEntryToCloud(currentEntryId);
        }

        function createFloatingAssetElement(id, type, content, x, y, size, rotation) {
            const assetEl = document.createElement('div');
            assetEl.id = id;
            assetEl.className = `scrapbook-asset ${type}-asset`;
            assetEl.setAttribute('contenteditable', 'false'); 
            assetEl.style.left = x + 'px';
            assetEl.style.top = y + 'px';
            
            const wrapper = document.createElement('div');
            wrapper.className = 'asset-wrapper';
            
            if (type === 'sticker') {
                wrapper.innerHTML = content;
                wrapper.style.fontSize = size + 'px';
            } else if (type === 'photo') {
                wrapper.innerHTML = `<img src="${content}" />`;
                assetEl.style.width = size + 'px';
            }
            assetEl.appendChild(wrapper);

            assetEl.innerHTML += `
                <div class="control-handle handle-delete" onclick="removeAsset('${id}', event)">×</div>
                <div class="control-handle handle-rotate">↻</div>
                <div class="control-handle handle-resize">⤡</div>
            `;

            document.getElementById('diaryText').appendChild(assetEl);
            applyAssetInteractions(assetEl, id, type);
            updateVisualTransform(assetEl, rotation);
        }

        function updateVisualTransform(elmnt, angle) {
            elmnt.style.transform = `rotate(${angle}deg)`;
            elmnt.setAttribute('data-rotation', angle);
        }

        function applyAssetInteractions(elmnt, id, type) {
            let isDragging = false, isResizing = false, isRotating = false;
            let startX, startY, startLeft, startTop, startSize, startAngle;

            elmnt.addEventListener('mousedown', initDrag);
            elmnt.addEventListener('touchstart', initDrag, { passive: false });

            const resizeHandle = elmnt.querySelector('.handle-resize');
            resizeHandle.addEventListener('mousedown', initResize);
            resizeHandle.addEventListener('touchstart', initResize, { passive: false });

            const rotateHandle = elmnt.querySelector('.handle-rotate');
            rotateHandle.addEventListener('mousedown', initRotate);
            rotateHandle.addEventListener('touchstart', initRotate, { passive: false });

            function getEventCoords(e) {
                if (e.touches && e.touches.length > 0) {
                    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
                }
                return { x: e.clientX, y: e.clientY };
            }

            function initDrag(e) {
                if (e.target.classList.contains('control-handle')) return;
                e.preventDefault();
                isDragging = true;
                const coords = getEventCoords(e);
                startX = coords.x; startY = coords.y;
                startLeft = parseInt(elmnt.style.left) || 0;
                startTop = parseInt(elmnt.style.top) || 0;

                document.addEventListener('mousemove', doDrag);
                document.addEventListener('touchmove', doDrag, { passive: false });
                document.addEventListener('mouseup', endAllTrackers);
                document.addEventListener('touchend', endAllTrackers);
            }

            function doDrag(e) {
                if (!isDragging) return;
                const coords = getEventCoords(e);
                elmnt.style.left = (startLeft + (coords.x - startX)) + 'px';
                elmnt.style.top = (startTop + (coords.y - startY)) + 'px';
            }

            function initResize(e) {
                e.preventDefault(); e.stopPropagation();
                isResizing = true;
                const coords = getEventCoords(e);
                startX = coords.x;
                startSize = type === 'sticker' ? parseFloat(elmnt.querySelector('.asset-wrapper').style.fontSize) : parseInt(elmnt.style.width);

                document.addEventListener('mousemove', doResize);
                document.addEventListener('touchmove', doResize, { passive: false });
                document.addEventListener('mouseup', endAllTrackers);
                document.addEventListener('touchend', endAllTrackers);
            }

            function doResize(e) {
                if (!isResizing) return;
                const coords = getEventCoords(e);
                let newSize = Math.max(20, startSize + (coords.x - startX));
                if (type === 'sticker') {
                    elmnt.querySelector('.asset-wrapper').style.fontSize = newSize + 'px';
                } else {
                    elmnt.style.width = newSize + 'px';
                }
            }

            function initRotate(e) {
                e.preventDefault(); e.stopPropagation();
                isRotating = true;
                const coords = getEventCoords(e);
                const rect = elmnt.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                startAngle = Math.atan2(coords.y - centerY, coords.x - centerX) * (180 / Math.PI);
                let currentRotation = parseFloat(elmnt.getAttribute('data-rotation')) || 0;

                function doRotate(ev) {
                    if (!isRotating) return;
                    const moveCoords = getEventCoords(ev);
                    const moveAngle = Math.atan2(moveCoords.y - centerY, moveCoords.x - centerX) * (180 / Math.PI);
                    updateVisualTransform(elmnt, currentRotation + (moveAngle - startAngle));
                }

                document.addEventListener('mousemove', doRotate);
                document.addEventListener('touchmove', doRotate, { passive: false });
                document.addEventListener('mouseup', endAllTrackers);
                document.addEventListener('touchend', endAllTrackers);
            }

            function endAllTrackers() {
                document.removeEventListener('mousemove', doDrag);
                document.removeEventListener('touchmove', doDrag);
                document.removeEventListener('mousemove', doResize);
                document.removeEventListener('touchmove', doResize);
                isDragging = false; isResizing = false; isRotating = false;
                
                if (currentEntryId && entries[currentEntryId].canvasAssets) {
                    const match = entries[currentEntryId].canvasAssets.find(a => a.id === id);
                    if (match) {
                        match.x = parseInt(elmnt.style.left);
                        match.y = parseInt(elmnt.style.top);
                        match.rotation = parseFloat(elmnt.getAttribute('data-rotation')) || 0;
                        match.size = type === 'sticker' ? parseFloat(elmnt.querySelector('.asset-wrapper').style.fontSize) : parseInt(elmnt.style.width);
                        pushEntryToCloud(currentEntryId);
                    }
                }
            }
        }

        function removeAsset(id, event) {
            if(event) event.stopPropagation();
            const element = document.getElementById(id);
            if (element) element.remove();
            
            if (currentEntryId && entries[currentEntryId].canvasAssets) {
                entries[currentEntryId].canvasAssets = entries[currentEntryId].canvasAssets.filter(a => a.id !== id);
                pushEntryToCloud(currentEntryId);
            }
        }

        function clearAllFloatingAssets() { document.querySelectorAll('.scrapbook-asset').forEach(el => el.remove()); }

        // --- GENERAL DIARY UTILITIES ---
        function renderEntryList() {
            const listContainer = document.getElementById('entryList');
            const searchQuery = document.getElementById('search').value.toLowerCase();
            listContainer.innerHTML = '';

            // Sort newest entries completely to the top
            const sortedIds = Object.keys(entries).sort((a, b) => b.localeCompare(a));
            sortedIds.forEach(id => {
                const entryData = entries[id];
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = entryData.text || '';
                const textContent = tempDiv.innerText || tempDiv.textContent || '';
                
                if (textContent.toLowerCase().includes(searchQuery)) {
                    const item = document.createElement('div');
                    item.className = `entry-item ${id === currentEntryId ? 'active' : ''}`;
                    item.onclick = () => { loadEntry(id); if(window.innerWidth <= 850) toggleSidebar(); };

                    const dateObject = new Date(entryData.display_date);
                    const formattedDate = dateObject.toLocaleDateString('en-US', {
                        weekday: 'short', year: 'numeric', month: 'short', day: 'numeric'
                    });

                    // Add a tiny time indicator if there are multiple entries on the same day
                    const timeLabel = id.includes('_') ? ' ✨' : '';

                    item.innerHTML = `
                        <div class="date">${formattedDate}${timeLabel}</div>
                        <div class="preview">${textContent.trim() || 'Empty page...'}</div>
                    `;
                    listContainer.appendChild(item);
                }
            });
        }

        function createNewEntry() {
            // Generates an explicit 2026-06-23 date string regardless of hardware timezone offset
            const localDate = new Date();
            const year = localDate.getFullYear();
            const month = String(localDate.getMonth() + 1).padStart(2, '0');
            const day = String(localDate.getDate()).padStart(2, '0');
            const dateStr = `${year}-${month}-${day}`;
            
            // Build a totally unique system unique ID using time millisecond stamp
            const uniqueId = dateStr + '_' + Date.now();

            entries[uniqueId] = { 
                text: "", 
                display_date: dateStr, 
                canvasAssets: [] 
            };
            
            pushEntryToCloud(uniqueId);
            loadEntry(uniqueId);
            if(window.innerWidth <= 850) toggleSidebar();
        }

        function loadEntry(idStr) {
            clearAllFloatingAssets();
            currentEntryId = idStr;
            
            const baseDate = entries[idStr].display_date;
            const dateObject = new Date(baseDate);
            const formattedDate = dateObject.toLocaleDateString('en-US', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });

            document.getElementById('displayDate').innerText = formattedDate;
            document.getElementById('diaryText').innerHTML = entries[idStr].text || '';
            
            document.getElementById('editorContainer').style.display = 'flex';
            document.getElementById('saveBtn').style.display = 'block';
            document.getElementById('deleteBtn').style.display = 'block';

            if (entries[idStr].canvasAssets) {
                entries[idStr].canvasAssets.forEach(a => {
                    createFloatingAssetElement(a.id, a.type, a.content, a.x, a.y, a.size, a.rotation);
                });
            }
            renderEntryList();
        }

        function saveCurrentEntry() {
            if (!currentEntryId) return;
            const textCleaner = document.getElementById('diaryText').cloneNode(true);
            textCleaner.querySelectorAll('.control-handle').forEach(h => h.remove());
            
            entries[currentEntryId].text = document.getElementById('diaryText').innerHTML;
            pushEntryToCloud(currentEntryId);
            renderEntryList();
            
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerText = "Saved! 🌸";
            setTimeout(() => saveBtn.innerText = "Save", 1500);
        }

        async function deleteCurrentEntry() {
            if (!currentEntryId) return;
            if (confirm("Delete this entry entirely?")) {
                clearAllFloatingAssets();
                if (supabaseClient) {
                    await supabaseClient.from('diary_entries').delete().eq('entry_date', currentEntryId);
                }
                delete entries[currentEntryId];
                localStorage.setItem('private_floral_diary_entries', JSON.stringify(entries));
                currentEntryId = null;
                document.getElementById('diaryText').innerHTML = '';
                document.getElementById('displayDate').innerText = 'Select or Create an Entry';
                document.getElementById('editorContainer').style.display = 'none';
                document.getElementById('saveBtn').style.display = 'none';
                document.getElementById('deleteBtn').style.display = 'none';
                renderEntryList();
            }
        }

        function exportBackup() {
            if (Object.keys(entries).length === 0) return alert("Journal is empty!");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(entries, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `diary_sync_backup.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }
    </script>
</body>
