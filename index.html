<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Private Garden of Thoughts</title>
    <style>
        :root {
            --bg-main: #fff5f6;
            --bg-sidebar: #ffe3e8;
            --bg-card: #ffffff; 
            --border: #f7b1bd;
            --text-main: #4a282d;
            --text-muted: #8c6066;
            --accent: #ff8fa3;
            --accent-hover: #ff758f;
            --danger: #e56b6f;
            --hl-pink: #ffccd5;
            --hl-yellow: #fff3b0;
            --hl-green: #c7f9cc;
            --floral-pattern: url('https://www.transparenttextures.com/patterns/floral-paper.png');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-main);
            background-image: var(--floral-pattern);
            color: var(--text-main);
            overflow: hidden;
            position: relative;
            font-family: 'Georgia', serif;
        }

        /* --- Password Lock Screen --- */
        #lockScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-main);
            background-image: var(--floral-pattern);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .lock-container {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: 3rem 2rem;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 25px rgba(247, 177, 189, 0.3);
        }

        .lock-container h1 { font-size: 1.6rem; font-style: italic; margin-bottom: 0.5rem; }
        .password-input {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border: 1px solid var(--border);
            border-radius: 20px;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            margin-bottom: 1.5rem;
        }
        .error-message { color: var(--danger); font-size: 0.9rem; margin-bottom: 1rem; font-style: italic; }

        /* --- Sidebar Styling --- */
        .sidebar {
            width: 300px;
            background-color: var(--bg-sidebar);
            border-right: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            height: 100%;
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .sidebar h2 {
            font-size: 1.3rem;
            margin-bottom: 1.2rem;
            text-align: center;
            font-style: italic;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 0.5rem;
        }

        .search-box {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-main);
            margin-bottom: 1rem;
            outline: none;
        }

        .entry-list { flex: 1; overflow-y: auto; margin-bottom: 1rem; }
        .entry-item {
            padding: 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 15px;
            margin-bottom: 0.75rem;
            cursor: pointer;
        }
        .entry-item.active { border-color: var(--accent-hover); background: #fff9fa; }
        .entry-item .date { font-size: 0.8rem; color: var(--accent-hover); font-weight: bold; }
        .entry-item .preview {
            font-size: 0.9rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Main Content Workspace --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; z-index: 5; }
        .left-toolbar-group { display: flex; align-items: center; gap: 0.75rem; }
        .current-date { font-size: 1.3rem; font-style: italic; }
        .btn-group { display: flex; gap: 0.5rem; }

        button, .toggle-sidebar-btn {
            padding: 0.7rem 1.2rem;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
        }

        .btn-primary { background-color: var(--accent); color: white; }
        .btn-secondary { background-color: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); }
        .btn-danger { background-color: transparent; color: var(--danger); }
        .toggle-sidebar-btn { background-color: var(--bg-sidebar); border: 1px solid var(--border); color: var(--text-main); }

        /* --- Text Editor Area --- */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(247, 177, 189, 0.15);
            z-index: 2;
        }

        .editor-tools {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 1rem;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            flex-wrap: wrap;
        }

        .tool-btn, .tool-select {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.4rem 0.8rem;
            border-radius: 12px;
            font-size: 0.9rem;
            min-height: 35px;
            cursor: pointer;
            outline: none;
        }

        /* Highlight Palette */
        .highlight-palette {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--bg-card);
            padding: 0.2rem 0.5rem;
            border-radius: 15px;
            border: 1px solid var(--border);
            min-height: 35px;
        }
        .highlight-palette span { font-size: 0.8rem; color: var(--text-muted); font-style: italic; margin-right: 0.2rem; }
        .hl-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.1);
            transition: transform 0.1s ease;
        }
        .hl-dot:hover { transform: scale(1.2); }

        .workspace-split { display: flex; flex: 1; overflow: hidden; position: relative; }

        .editor-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 1.5rem;
            font-size: 1.2rem;
            line-height: 1.7;
            outline: none;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            z-index: 1;
        }

        .editor-input[placeholder]:empty:before {
            content: attr(placeholder);
            color: var(--text-muted);
            font-style: italic;
        }

        /* --- Sticker Side Drawer --- */
        .scrapbook-sidebar {
            width: 160px;
            background: #fffdfd;
            border-left: 1px dashed var(--border);
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 10;
        }

        .scrapbook-sidebar h4 {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
            font-style: italic;
            border-bottom: 1px dotted var(--border);
            padding-bottom: 0.2rem;
        }

        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            justify-items: center;
        }

        .tray-sticker {
            font-size: 2.2rem;
            cursor: grab;
            user-select: none;
            transition: transform 0.2s;
        }
        .tray-sticker:hover { transform: scale(1.15); }

        /* --- UNIFIED CANVAS DRAGGABLE ASSETS --- */
        .scrapbook-asset {
            position: absolute;
            cursor: move;
            user-select: none;
            z-index: 50;
            touch-action: none;
        }

        .scrapbook-asset.sticker-asset {
            font-size: 2.8rem;
            line-height: 1;
        }

        .scrapbook-asset.photo-asset {
            max-width: 220px;
            background: white;
            padding: 8px 8px 24px 8px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 10px rgba(247, 177, 189, 0.3);
            border-radius: 4px;
            transform: rotate(-2deg); /* Polarised look */
        }

        .scrapbook-asset.photo-asset img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 2px;
            pointer-events: none; /* Passes control directly down to touch handler wrapper */
        }

        .delete-asset-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.75rem;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 60;
        }
        .scrapbook-asset:hover .delete-asset-btn { display: flex; }

        #imageInput { display: none; }

        @media (max-width: 850px) {
            .sidebar { position: absolute; left: 0; top: 0; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .workspace-split { flex-direction: column; }
            .scrapbook-sidebar { width: 100%; height: 110px; border-left: none; border-top: 1px dashed var(--border); flex-direction: row; }
            .sticker-grid { grid-template-columns: repeat(8, 1fr); width: 100%; }
        }
    </style>
</head>
<body>

    <div id="lockScreen">
        <div class="lock-container">
            <h1>Secret Garden 🔐</h1>
            <p>Enter password to unlock your notes...</p>
            <input type="password" id="passwordField" class="password-input" placeholder="••••••" maxlength="6" autofocus onkeydown="if(event.key === 'Enter') checkPassword()">
            <div id="errMessage" class="error-message"></div>
            <button class="btn-primary" style="width: 100%;" onclick="checkPassword()">Unlock Entry</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <h2>My Blooming Thoughts 🌸</h2>
        <button class="btn-primary" style="margin-bottom: 1rem;" onclick="createNewEntry()">+ New Entry</button>
        <input type="text" class="search-box" id="search" placeholder="Search memories..." oninput="renderEntryList()">
        <div class="entry-list" id="entryList"></div>
        <button class="btn-secondary" onclick="exportBackup()">📥 Download Backup</button>
    </div>

    <div class="main-content" id="mainWorkspace">
        <div class="toolbar">
            <div class="left-toolbar-group">
                <button class="toggle-sidebar-btn" onclick="toggleSidebar()">📖 Journal</button>
                <div class="current-date" id="displayDate">Select or Create an Entry</div>
            </div>
            <div class="btn-group">
                <button class="btn-danger" id="deleteBtn" onclick="deleteCurrentEntry()" style="display: none;">Delete</button>
                <button class="btn-primary" id="saveBtn" onclick="saveCurrentEntry()" style="display: none;">Save</button>
            </div>
        </div>

        <div class="editor-container" id="editorContainer" style="display: none;">
            <div class="editor-tools">
                <button class="tool-btn" style="font-weight: bold;" onclick="formatDoc('bold')">B</button>
                <button class="tool-btn" style="font-style: italic;" onclick="formatDoc('italic')">I</button>
                
                <select class="tool-select" id="fontSelector" onchange="formatDoc('fontName', this.value)">
                    <option value="Georgia">Georgia</option>
                    <option value="'Courier New', monospace">Courier</option>
                    <option value="'Comic Sans MS', cursive">Comic Sans</option>
                    <option value="sans-serif">Arial</option>
                </select>

                <div class="highlight-palette">
                    <span>Highlight:</span>
                    <div class="hl-dot" style="background: var(--hl-pink);" onmousedown="event.preventDefault(); formatDoc('backColor', '#ffccd5');" ontouchstart="event.preventDefault(); formatDoc('backColor', '#ffccd5');"></div>
                    <div class="hl-dot" style="background: var(--hl-yellow);" onmousedown="event.preventDefault(); formatDoc('backColor', '#fff3b0');" ontouchstart="event.preventDefault(); formatDoc('backColor', '#fff3b0');"></div>
                    <div class="hl-dot" style="background: var(--hl-green);" onmousedown="event.preventDefault(); formatDoc('backColor', '#c7f9cc');" ontouchstart="event.preventDefault(); formatDoc('backColor', '#c7f9cc');"></div>
                    <div class="hl-dot" style="background: #ffffff; position: relative;" onmousedown="event.preventDefault(); formatDoc('backColor', 'transparent');" ontouchstart="event.preventDefault(); formatDoc('backColor', 'transparent');">
                        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); width: 100%; height: 1px; background: red;"></div>
                    </div>
                </div>

                <button class="tool-btn" onclick="document.getElementById('imageInput').click()">🖼️ Add Floating Photo</button>
                <input type="file" id="imageInput" accept="image/*" onchange="handleScrapbookImageUpload(event)">
            </div>
            
            <div class="workspace-split" id="canvasSplitContainer">
                <div class="editor-input" id="diaryText" contenteditable="true" placeholder="Pour your heart out here..."></div>
                
                <div class="scrapbook-sidebar">
                    <h4>Stickers ✨</h4>
                    <div class="sticker-grid">
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '🌸')">🌸</div>
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '💖')">💖</div>
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '🎀')">🎀</div>
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '🧸')">🧸</div>
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '🐱')">🐱</div>
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '🧁')">🧁</div>
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '⭐')">⭐</div>
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '☁️')">☁️</div>
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '🎨')">🎨</div>
                        <div class="tray-sticker" onclick="spawnAsset('sticker', '💘')">💘</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let entries = JSON.parse(localStorage.getItem('private_floral_diary_entries')) || {};
        let currentEntryId = null;

        function checkPassword() {
            const entered = document.getElementById('passwordField').value;
            if (entered === "200600") {
                const lockScreen = document.getElementById('lockScreen');
                lockScreen.style.opacity = '0';
                setTimeout(() => lockScreen.style.visibility = 'hidden', 500);
                renderEntryList();
                const todayStr = new Date().toISOString().split('T')[0];
                if (entries[todayStr]) loadEntry(todayStr);
            } else {
                document.getElementById('errMessage').innerText = "Incorrect secret key... 💕";
                document.getElementById('passwordField').value = '';
            }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function formatDoc(cmd, value = null) { document.execCommand(cmd, false, value); document.getElementById('diaryText').focus(); }

        // --- UNIFIED DRAGGABLE CANVAS ASSETS ENGINE ---
        function handleScrapbookImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) { 
                alert("Please compress image files down under 2MB to keep performance fast!");
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                spawnAsset('photo', e.target.result);
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        function spawnAsset(type, content, x = 120, y = 120) {
            if (!currentEntryId) return;
            
            const assetId = 'asset_' + Date.now() + Math.random().toString(36).substr(2, 5);
            createFloatingAssetElement(assetId, type, content, x, y);
            
            if (!entries[currentEntryId].canvasAssets) entries[currentEntryId].canvasAssets = [];
            entries[currentEntryId].canvasAssets.push({ id: assetId, type: type, content: content, x: x, y: y });
            saveToStorage();
        }

        function createFloatingAssetElement(id, type, content, x, y) {
            const assetEl = document.createElement('div');
            assetEl.id = id;
            assetEl.className = `scrapbook-asset ${type}-asset`;
            assetEl.style.left = x + 'px';
            assetEl.style.top = y + 'px';

            if (type === 'sticker') {
                assetEl.innerHTML = `${content}`;
            } else if (type === 'photo') {
                assetEl.innerHTML = `<img src="${content}" alt="Scrapbook Memory" />`;
            }

            // Create contextual cross button overlay
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-asset-btn';
            deleteBtn.innerText = '×';
            deleteBtn.onclick = (e) => removeAsset(id, e);
            assetEl.appendChild(deleteBtn);
            
            document.getElementById('canvasSplitContainer').appendChild(assetEl);
            makeElementDraggable(assetEl);
        }

        function removeAsset(id, event) {
            event.stopPropagation();
            const element = document.getElementById(id);
            if (element) element.remove();
            
            if (currentEntryId && entries[currentEntryId].canvasAssets) {
                entries[currentEntryId].canvasAssets = entries[currentEntryId].canvasAssets.filter(a => a.id !== id);
                saveToStorage();
            }
        }

        function clearAllFloatingAssets() {
            document.querySelectorAll('.scrapbook-asset').forEach(el => el.remove());
        }

        function makeElementDraggable(elmnt) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            elmnt.onmousedown = dragMouseDown;
            elmnt.ontouchstart = dragTouchStart;

            function dragMouseDown(e) {
                if (e.target.className === 'delete-asset-btn') return;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function dragTouchStart(e) {
                if (e.target.className === 'delete-asset-btn') return;
                pos3 = e.touches[0].clientX;
                pos4 = e.touches[0].clientY;
                document.ontouchend = closeDragElement;
                document.ontouchmove = elementTouchDrag;
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                updatePosition(elmnt.offsetTop - pos2, elmnt.offsetLeft - pos1);
            }

            function elementTouchDrag(e) {
                pos1 = pos3 - e.touches[0].clientX;
                pos2 = pos4 - e.touches[0].clientY;
                pos3 = e.touches[0].clientX;
                pos4 = e.touches[0].clientY;
                updatePosition(elmnt.offsetTop - pos2, elmnt.offsetLeft - pos1);
            }

            function updatePosition(top, left) {
                elmnt.style.top = top + "px";
                elmnt.style.left = left + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                document.ontouchend = null;
                document.ontouchmove = null;
                
                if (currentEntryId && entries[currentEntryId].canvasAssets) {
                    const match = entries[currentEntryId].canvasAssets.find(a => a.id === elmnt.id);
                    if (match) {
                        match.x = parseInt(elmnt.style.left);
                        match.y = parseInt(elmnt.style.top);
                        saveToStorage();
                    }
                }
            }
        }

        // --- DIARY ENGINE BACKEND ---
        function renderEntryList() {
            const listContainer = document.getElementById('entryList');
            const searchQuery = document.getElementById('search').value.toLowerCase();
            listContainer.innerHTML = '';

            const sortedDates = Object.keys(entries).sort((a, b) => new Date(b) - new Date(a));
            sortedDates.forEach(date => {
                const entryData = entries[date];
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = entryData.text || '';
                const textContent = tempDiv.innerText || tempDiv.textContent || '';
                
                if (textContent.toLowerCase().includes(searchQuery)) {
                    const item = document.createElement('div');
                    item.className = `entry-item ${date === currentEntryId ? 'active' : ''}`;
                    item.onclick = () => { loadEntry(date); if(window.innerWidth <= 850) toggleSidebar(); };

                    const formattedDate = new Date(date).toLocaleDateString('en-US', {
                        weekday: 'short', year: 'numeric', month: 'short', day: 'numeric'
                    });

                    item.innerHTML = `
                        <div class="date">${formattedDate}</div>
                        <div class="preview">${textContent.trim() || 'Empty page...'}</div>
                    `;
                    listContainer.appendChild(item);
                }
            });
        }

        function createNewEntry() {
            const dateStr = new Date().toISOString().split('T')[0];
            if (entries[dateStr] !== undefined) {
                loadEntry(dateStr);
                if(window.innerWidth <= 850) toggleSidebar();
                return;
            }
            entries[dateStr] = { text: "", canvasAssets: [] };
            saveToStorage();
            loadEntry(dateStr);
            if(window.innerWidth <= 850) toggleSidebar();
        }

        function loadEntry(dateStr) {
            clearAllFloatingAssets();
            currentEntryId = dateStr;
            const formattedDate = new Date(dateStr).toLocaleDateString('en-US', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });

            document.getElementById('displayDate').innerText = formattedDate;
            document.getElementById('diaryText').innerHTML = entries[dateStr].text || '';
            
            document.getElementById('editorContainer').style.display = 'flex';
            document.getElementById('saveBtn').style.display = 'block';
            document.getElementById('deleteBtn').style.display = 'block';

            // Respawn all layered items for this entry
            if (entries[dateStr].canvasAssets) {
                entries[dateStr].canvasAssets.forEach(a => {
                    createFloatingAssetElement(a.id, a.type, a.content, a.x, a.y);
                });
            }
            renderEntryList();
        }

        function saveCurrentEntry() {
            if (!currentEntryId) return;
            entries[currentEntryId].text = document.getElementById('diaryText').innerHTML;
            saveToStorage();
            renderEntryList();
            
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerText = "Saved! 🌸";
            setTimeout(() => saveBtn.innerText = "Save", 1500);
        }

        function deleteCurrentEntry() {
            if (!currentEntryId) return;
            if (confirm("Delete this diary page?")) {
                clearAllFloatingAssets();
                delete entries[currentEntryId];
                saveToStorage();
                currentEntryId = null;
                document.getElementById('diaryText').innerHTML = '';
                document.getElementById('displayDate').innerText = 'Select or Create an Entry';
                document.getElementById('editorContainer').style.display = 'none';
                document.getElementById('saveBtn').style.display = 'none';
                document.getElementById('deleteBtn').style.display = 'none';
                renderEntryList();
            }
        }

        function saveToStorage() { localStorage.setItem('private_floral_diary_entries', JSON.stringify(entries)); }
        function exportBackup() {
            if (Object.keys(entries).length === 0) return alert("Journal is empty!");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(entries, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `diary_backup_${new Date().toISOString().split('T')[0]}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }
    </script>
